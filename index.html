<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ORVA">
<meta name="theme-color" content="#EDEAE3">
<title>ORVA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,200;0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg:         #EDEAE3;
  --surface:    #F7F5F1;
  --surface-2:  #FFFFFF;
  --border:     #DDD9D0;
  --border-2:   #CECA BF;
  --text:       #1C1A16;
  --text-dim:   #857F74;
  --text-faint: #B5B0A5;
  --accent:     #1ABAAA;
  --accent-2:   #148F82;
  --accent-bg:  #E6F7F5;
  --go:         #3DAA6A;
  --caution:    #C8960A;
  --stop:       #D94040;
  --font:       'DM Sans', -apple-system, sans-serif;
  --hero-bg:    #1C1A16;
  --hero-text:  #F8F8F5;
  --app-h:      100dvh;
  --r:          16px;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%; overflow: hidden; background: var(--bg);
  color: var(--text); font-family: var(--font); font-weight: 300;
  -webkit-font-smoothing: antialiased; position: fixed; width: 100%;
}

.app {
  display: flex; flex-direction: column; height: var(--app-h);
  max-width: 520px; margin: 0 auto; background: var(--bg);
  position: relative; overflow: hidden;
}

.hidden { display: none !important; }

/* ─── ONBOARDING ─────────────────────────────── */
.ob {
  position: fixed; inset: 0; background: var(--bg); z-index: 50;
  display: flex; flex-direction: column; max-width: 520px; margin: 0 auto;
  padding: max(env(safe-area-inset-top),44px) 28px max(env(safe-area-inset-bottom),28px);
}
.ob-logo { display: flex; align-items: center; gap: 8px; margin-bottom: auto; padding-top: 4px; }
.ob-logo-mark {
  width: 30px; height: 30px; background: var(--text); border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
}
.ob-logo-mark span { color: var(--bg); font-size: 15px; font-weight: 600; letter-spacing: -0.5px; }
.ob-logo-name { font-size: 15px; font-weight: 500; letter-spacing: -0.3px; }

.ob-progress { height: 2px; background: var(--border); border-radius: 99px; margin: 20px 0 0; overflow: hidden; }
.ob-progress-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width .4s ease; }

.ob-content { flex: 1; padding-top: 28px; overflow-y: auto; }
.ob-step-num { font-size: 11px; font-weight: 500; color: var(--text-faint); letter-spacing: .6px; text-transform: uppercase; margin-bottom: 12px; }
.ob-title { font-size: 32px; font-weight: 300; line-height: 1.15; letter-spacing: -.8px; margin-bottom: 8px; }
.ob-sub { font-size: 14px; color: var(--text-dim); margin-bottom: 28px; font-weight: 400; }

.ob-chips { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
.ob-chip {
  padding: 14px 12px; border-radius: 14px; border: 1.5px solid var(--border);
  background: var(--surface-2); font-family: var(--font); font-size: 13px;
  font-weight: 500; color: var(--text-dim); cursor: pointer; transition: all .15s;
  text-align: center; letter-spacing: -.1px;
}
.ob-chip.active { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }

.ob-options { display: flex; flex-direction: column; gap: 9px; }
.ob-option {
  padding: 16px 18px; border-radius: 14px; border: 1.5px solid var(--border);
  background: var(--surface-2); font-family: var(--font); font-size: 14px;
  font-weight: 400; color: var(--text); cursor: pointer; transition: all .15s;
  display: flex; align-items: center; justify-content: space-between;
}
.ob-option.active { border-color: var(--text); background: var(--text); color: var(--bg); }
.ob-check { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.ob-option.active .ob-check { border-color: var(--bg); background: var(--bg); }
.ob-check svg { opacity: 0; }
.ob-option.active .ob-check svg { opacity: 1; }

.ob-freq { display: flex; flex-direction: column; align-items: center; gap: 28px; padding-top: 16px; }
.ob-freq-num { font-size: 88px; font-weight: 200; letter-spacing: -5px; color: var(--accent); line-height: 1; }
.ob-freq-dots { display: flex; gap: 10px; }
.ob-freq-dot {
  width: 38px; height: 38px; border-radius: 50%; border: 1.5px solid var(--border);
  background: var(--surface-2); font-family: var(--font); font-size: 14px;
  font-weight: 500; color: var(--text-dim); cursor: pointer; transition: all .15s;
  display: flex; align-items: center; justify-content: center;
}
.ob-freq-dot.active { background: var(--text); border-color: var(--text); color: var(--bg); }

.ob-input {
  width: 100%; padding: 18px 20px; border-radius: 14px; border: 1.5px solid var(--border);
  background: var(--surface-2); font-family: var(--font); font-size: 22px;
  font-weight: 300; color: var(--text); outline: none; letter-spacing: -.4px;
  transition: border-color .2s;
}
.ob-input:focus { border-color: var(--accent); }
.ob-input-suffix {
  position: absolute; right: 18px; top: 50%; transform: translateY(-50%);
  font-size: 16px; font-weight: 500; color: var(--text-faint);
}
.ob-input-wrap { position: relative; }

.ob-footer { padding-top: 20px; }
.ob-back {
  background: none; border: none; padding: 12px 0; cursor: pointer;
  display: flex; align-items: center; gap: 6px; color: var(--text-dim);
  font-family: var(--font); font-size: 14px; margin-bottom: 8px;
}
.ob-next {
  width: 100%; padding: 17px; border-radius: 14px; border: none;
  background: var(--text); color: var(--bg); font-family: var(--font);
  font-size: 15px; font-weight: 500; cursor: pointer; transition: all .15s;
  letter-spacing: -.2px;
}
.ob-next:disabled { background: var(--border); color: var(--text-faint); cursor: default; }

/* ─── HEADER ──────────────────────────────────── */
.header {
  padding: max(env(safe-area-inset-top),16px) 20px 14px;
  border-bottom: 1px solid var(--border); background: var(--bg);
  display: flex; align-items: center; gap: 12px; z-index: 10; flex-shrink: 0;
}
.header-avatar {
  width: 36px; height: 36px; border-radius: 10px; background: var(--text);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0; position: relative;
}
.header-avatar span { color: var(--bg); font-size: 14px; font-weight: 600; letter-spacing: -.5px; }
.header-avatar::after {
  content: ''; position: absolute; bottom: -1px; right: -1px;
  width: 9px; height: 9px; border-radius: 50%; background: var(--go); border: 2px solid var(--bg);
}
.header-avatar.thinking::after { background: var(--caution); animation: pulse 1s infinite; }
.header-avatar.error::after { background: var(--stop); }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }
.header-name { font-size: 15px; font-weight: 500; letter-spacing: -.2px; }
.header-status { font-size: 11px; color: var(--text-faint); margin-top: 1px; letter-spacing: .1px; }
.header-info { flex: 1; }
.header-btn {
  width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
  border-radius: 10px; cursor: pointer; border: none; background: none; transition: background .15s;
}
.header-btn:active { background: var(--border); }

/* ─── SCREENS ─────────────────────────────────── */
.screen { display: flex; flex-direction: column; flex: 1; overflow: hidden; }

/* ─── CONVERSATION ─────────────────────────────── */
.conversation {
  flex: 1; overflow-y: auto; padding: 18px 16px 8px;
  display: flex; flex-direction: column; gap: 10px;
  -webkit-overflow-scrolling: touch; overscroll-behavior: contain;
}
.conversation::-webkit-scrollbar { width: 0; }

.day-marker {
  align-self: center; font-size: 10px; font-weight: 500; color: var(--text-faint);
  text-transform: uppercase; letter-spacing: .18em; padding: 4px 10px; margin: 4px 0;
}

.msg { max-width: 83%; animation: msgIn .25s ease-out; }
@keyframes msgIn { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
.msg-agent { align-self: flex-start; }
.msg-user  { align-self: flex-end; }

.msg-bubble {
  padding: 11px 15px; border-radius: 18px;
  font-size: 15px; line-height: 1.55; word-wrap: break-word; white-space: pre-wrap; font-weight: 300;
}
.msg-agent .msg-bubble {
  background: var(--surface-2); border: 1px solid var(--border); border-bottom-left-radius: 5px;
}
.msg-user .msg-bubble {
  background: var(--text); color: var(--bg); border-bottom-right-radius: 5px; font-weight: 400;
}
.msg-bubble strong { font-weight: 500; }
.msg-time { font-size: 10px; color: var(--text-faint); margin-top: 4px; padding: 0 5px; }
.msg-user .msg-time { text-align: right; }
.msg-error .msg-bubble { background: rgba(217,64,64,.07); border-color: var(--stop); color: var(--stop); }

/* ─── VERDICT CARD ─────────────────────────────── */
.verdict {
  align-self: stretch; max-width: 100%;
  background: var(--surface-2); border: 1px solid var(--border);
  border-radius: 18px; padding: 20px; margin: 6px 0;
  animation: verdictIn .5s cubic-bezier(.2,.8,.2,1);
}
@keyframes verdictIn { from{opacity:0;transform:translateY(10px) scale(.98)} to{opacity:1;transform:none} }

.v-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.v-pill { display: flex; align-items: center; gap: 7px; }
.v-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.v-dot.go     { background: var(--go);      box-shadow: 0 0 8px var(--go); }
.v-dot.caution{ background: var(--caution); box-shadow: 0 0 8px var(--caution); }
.v-dot.stop   { background: var(--stop);    box-shadow: 0 0 8px var(--stop); }
.v-pill-label { font-size: 10px; font-weight: 600; letter-spacing: .2em; text-transform: uppercase; color: var(--text); }
.v-ts { font-size: 10px; color: var(--text-faint); letter-spacing: .05em; }
.v-gauge { width: 100%; max-width: 280px; height: 120px; display: block; margin: 12px auto 4px; overflow: visible; }
.v-title { text-align: center; font-size: 18px; font-weight: 300; letter-spacing: -.4px; line-height: 1.3; margin-bottom: 20px; padding: 0 6px; }
.v-bars { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; }
.v-bar-row { display: flex; justify-content: space-between; margin-bottom: 6px; align-items: baseline; }
.v-bar-lbl { font-size: 10px; font-weight: 500; color: var(--text-dim); letter-spacing: .15em; text-transform: uppercase; }
.v-bar-val { font-size: 13px; font-weight: 300; color: var(--text); }
.v-bar-val .u { color: var(--text-faint); font-size: 10px; }
.v-bar-track { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.v-bar-fill { height: 100%; border-radius: 2px; transition: width .8s cubic-bezier(.2,.8,.2,1); }
.v-tip {
  background: var(--accent-bg); border-radius: 10px; padding: 11px 14px;
  margin-bottom: 14px; display: flex; gap: 10px; align-items: flex-start;
}
.v-tip-lbl { font-size: 10px; font-weight: 600; color: var(--accent); letter-spacing: .15em; text-transform: uppercase; padding-top: 2px; flex-shrink: 0; }
.v-tip-txt { font-size: 13px; color: var(--text-dim); line-height: 1.5; flex: 1; font-weight: 300; }
.v-actions { padding-top: 14px; border-top: 1px solid var(--border); }
.v-act-title { font-size: 10px; font-weight: 500; color: var(--text-faint); letter-spacing: .18em; text-transform: uppercase; margin-bottom: 10px; }
.v-act-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 12px; margin-bottom: 8px; }
.v-act-item { display: flex; align-items: flex-start; gap: 8px; font-size: 13px; font-weight: 300; }
.v-act-icon { font-size: 12px; font-weight: 600; flex-shrink: 0; padding-top: 1px; }
.v-act-icon.do { color: var(--go); }
.v-act-icon.no { color: var(--stop); }
.v-act-item.no { color: var(--text-dim); }
.v-reasoning {
  padding: 14px 0 0; margin-top: 14px; border-top: 1px solid var(--border);
  font-size: 13px; line-height: 1.6; color: var(--text-dim); font-weight: 300;
}
.v-reasoning strong { color: var(--text); font-weight: 500; }

/* ─── TYPING / STREAMING ───────────────────────── */
.typing {
  align-self: flex-start; background: var(--surface-2); border: 1px solid var(--border);
  padding: 13px 17px; border-radius: 18px 18px 18px 5px; display: flex; gap: 4px;
}
.typing span {
  width: 6px; height: 6px; border-radius: 50%; background: var(--text-faint);
  animation: tp 1.4s infinite;
}
.typing span:nth-child(2){animation-delay:.2s} .typing span:nth-child(3){animation-delay:.4s}
@keyframes tp { 0%,60%,100%{opacity:.3;transform:translateY(0)} 30%{opacity:1;transform:translateY(-4px)} }

.s-cursor {
  display: inline-block; width: 7px; height: 14px; background: var(--accent);
  margin-left: 2px; animation: blink .7s infinite; vertical-align: text-bottom;
}
@keyframes blink { 0%,50%{opacity:1} 51%,100%{opacity:0} }

/* ─── QUICK REPLIES ───────────────────────────── */
.quick-replies { padding: 0 16px 10px; display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; flex-shrink: 0; }
.quick-replies::-webkit-scrollbar { display: none; }
.qr-btn {
  flex-shrink: 0; padding: 8px 14px; border-radius: 99px;
  border: 1.5px solid var(--border); background: var(--surface-2);
  color: var(--text-dim); font-size: 13px; font-weight: 400; cursor: pointer;
  font-family: var(--font); white-space: nowrap; transition: all .15s;
}
.qr-btn:active { background: var(--border); }

/* ─── INPUT ───────────────────────────────────── */
.input-zone {
  padding: 10px 12px max(env(safe-area-inset-bottom),12px);
  border-top: 1px solid var(--border); background: var(--bg); flex-shrink: 0;
}
.input-wrap {
  display: flex; align-items: flex-end; gap: 8px;
  background: var(--surface-2); border: 1.5px solid var(--border);
  border-radius: 22px; padding: 4px 4px 4px 16px; transition: border-color .2s;
}
.input-wrap:focus-within { border-color: var(--accent); }
.input-field {
  flex: 1; background: transparent; border: none; outline: none;
  color: var(--text); font-family: var(--font); font-size: 15px; font-weight: 300;
  padding: 10px 0; resize: none; max-height: 100px; min-height: 24px; line-height: 1.4;
}
.input-field::placeholder { color: var(--text-faint); }
.send-btn {
  width: 36px; height: 36px; border-radius: 50%; border: none;
  background: var(--accent); color: #fff; display: flex; align-items: center;
  justify-content: center; cursor: pointer; flex-shrink: 0; transition: transform .15s, opacity .2s;
}
.send-btn:disabled { opacity: .3; cursor: not-allowed; }
.send-btn:not(:disabled):active { transform: scale(.92); }

/* ─── BOTTOM NAV ──────────────────────────────── */
.bottom-nav {
  display: flex; justify-content: space-around; align-items: center;
  padding: 10px 8px max(env(safe-area-inset-bottom),12px);
  background: var(--bg); border-top: 1px solid var(--border); flex-shrink: 0;
}
.nav-btn {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 6px 18px; border-radius: 12px; background: none; border: none;
  cursor: pointer; font-family: var(--font); transition: all .15s; flex: 1;
}
.nav-btn svg { stroke: var(--text-faint); transition: stroke .15s; }
.nav-btn span { font-size: 10px; font-weight: 500; color: var(--text-faint); letter-spacing: .1px; transition: color .15s; }
.nav-btn.active { background: var(--surface-2); }
.nav-btn.active svg { stroke: var(--text); }
.nav-btn.active span { color: var(--text); }

/* ─── CARDS SCREEN ─────────────────────────────── */
.cards-screen { flex: 1; overflow-y: auto; padding: 0 0 20px; }
.cards-screen::-webkit-scrollbar { display: none; }
.cs-hero {
  background: var(--hero-bg); color: var(--hero-text); padding: 20px;
  margin: 0 16px 16px; border-radius: 18px; margin-top: 16px;
}
.cs-hero-label { font-size: 10px; font-weight: 500; letter-spacing: .18em; text-transform: uppercase; opacity: .45; margin-bottom: 4px; }
.cs-hero-date { font-size: 14px; font-weight: 400; opacity: .7; margin-bottom: 20px; }
.cs-rings { display: flex; justify-content: space-between; align-items: flex-end; }
.cs-ring { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.cs-ring-lbl { font-size: 10px; font-weight: 500; letter-spacing: .12em; text-transform: uppercase; opacity: .5; }

.cs-section-title { font-size: 13px; font-weight: 500; color: var(--text-dim); letter-spacing: .1px; padding: 0 20px; margin-bottom: 10px; }
.cs-cards-list { display: flex; flex-direction: column; gap: 10px; padding: 0 16px; }

/* ─── HISTORY SCREEN ───────────────────────────── */
.history-screen { flex: 1; overflow-y: auto; padding: 16px 16px 0; }
.history-screen::-webkit-scrollbar { display: none; }
.hs-topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.hs-title { font-size: 20px; font-weight: 500; letter-spacing: -.4px; }
.hs-add {
  width: 34px; height: 34px; border-radius: 10px; background: var(--text);
  border: none; color: var(--bg); font-size: 20px; cursor: pointer; display: flex;
  align-items: center; justify-content: center; font-family: var(--font); line-height: 1;
}
.hs-pills { display: flex; gap: 8px; margin-bottom: 16px; }
.hs-pill {
  padding: 6px 14px; border-radius: 99px; border: 1.5px solid var(--border);
  background: var(--surface-2); font-size: 12px; font-weight: 500; color: var(--text-dim);
  cursor: pointer; font-family: var(--font); transition: all .15s;
}
.hs-pill.active { background: var(--text); border-color: var(--text); color: var(--bg); }
.hs-list { display: flex; flex-direction: column; gap: 10px; padding-bottom: 100px; }

.hs-item {
  background: var(--surface-2); border: 1.5px solid var(--border); border-radius: 16px;
  padding: 16px; cursor: pointer; transition: border-color .2s;
}
.hs-item.active-item { border-color: var(--stop); }
.hs-item.resolving { border-color: var(--caution); }
.hs-item-top { display: flex; align-items: flex-start; gap: 12px; }
.hs-type-pill {
  font-size: 10px; font-weight: 600; letter-spacing: .2em; text-transform: uppercase;
  padding: 3px 9px; border-radius: 99px;
}
.hs-type-pill.molestia { background: rgba(200,150,10,.1); color: var(--caution); }
.hs-type-pill.lesion   { background: rgba(217,64,64,.1);  color: var(--stop); }
.hs-type-pill.tension  { background: var(--accent-bg);    color: var(--accent); }
.hs-item-zone { font-size: 16px; font-weight: 500; letter-spacing: -.3px; margin-bottom: 4px; margin-top: 6px; }
.hs-item-meta { display: flex; align-items: center; gap: 8px; }
.hs-status-dot { width: 6px; height: 6px; border-radius: 50%; }
.hs-status-label { font-size: 12px; font-weight: 500; }
.hs-date { font-size: 12px; color: var(--text-faint); margin-left: auto; }
.hs-detail { margin-top: 12px; font-size: 13px; color: var(--text-dim); line-height: 1.5; font-weight: 300; }
.hs-timeline { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
.hs-tl-title { font-size: 10px; font-weight: 500; color: var(--text-faint); letter-spacing: .15em; text-transform: uppercase; margin-bottom: 10px; }
.hs-tl-list { display: flex; flex-direction: column; gap: 10px; position: relative; padding-left: 18px; }
.hs-tl-list::before { content: ''; position: absolute; left: 5px; top: 6px; bottom: 6px; width: 1px; background: var(--border); }
.hs-tl-item { position: relative; }
.hs-tl-dot { width: 11px; height: 11px; border-radius: 50%; border: 2px solid var(--surface-2); position: absolute; left: -18px; top: 3px; }
.hs-tl-date { font-size: 10px; color: var(--text-faint); font-weight: 500; margin-bottom: 2px; }
.hs-tl-text { font-size: 13px; color: var(--text); font-weight: 300; }

/* ─── ADD FORM ─────────────────────────────────── */
.add-form {
  background: var(--surface-2); border: 1.5px solid var(--border); border-radius: 16px;
  padding: 16px; margin-bottom: 10px;
}
.add-form-title { font-size: 14px; font-weight: 500; margin-bottom: 14px; }
.add-form-types { display: flex; gap: 8px; margin-bottom: 12px; }
.add-form-type {
  flex: 1; padding: 9px 4px; border-radius: 10px; border: 1.5px solid var(--border);
  background: var(--bg); font-family: var(--font); font-size: 12px; font-weight: 500;
  color: var(--text-dim); cursor: pointer; transition: all .15s; text-align: center;
}
.add-form-type.active { background: var(--text); border-color: var(--text); color: var(--bg); }
.add-form-input {
  width: 100%; padding: 12px 14px; border-radius: 10px; border: 1.5px solid var(--border);
  background: var(--bg); font-family: var(--font); font-size: 14px; font-weight: 300;
  color: var(--text); outline: none; margin-bottom: 10px; transition: border-color .2s;
}
.add-form-input:focus { border-color: var(--accent); }
.add-form-save {
  width: 100%; padding: 13px; border-radius: 10px; border: none;
  background: var(--text); color: var(--bg); font-family: var(--font); font-size: 14px;
  font-weight: 500; cursor: pointer;
}

/* ─── TWEAKS PANEL ─────────────────────────────── */
.tweaks {
  position: fixed; bottom: 100px; right: 16px; width: 240px;
  background: var(--surface-2); border: 1px solid var(--border);
  border-radius: 18px; padding: 16px; z-index: 200;
  box-shadow: 0 8px 32px rgba(0,0,0,.12);
  animation: tweaksIn .2s ease-out;
}
@keyframes tweaksIn { from{opacity:0;transform:translateY(8px) scale(.97)} to{opacity:1;transform:none} }
.tweaks-title { font-size: 12px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 14px; }
.tweaks-section { margin-bottom: 14px; }
.tweaks-lbl { font-size: 11px; font-weight: 500; color: var(--text-faint); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 8px; }
.tweaks-swatches { display: flex; gap: 7px; flex-wrap: wrap; }
.tw-swatch {
  width: 26px; height: 26px; border-radius: 50%; cursor: pointer;
  border: 2px solid transparent; transition: transform .15s; flex-shrink: 0;
}
.tw-swatch:hover { transform: scale(1.15); }
.tw-swatch.selected { border-color: var(--text); }
.tweaks-close {
  width: 100%; padding: 9px; border-radius: 9px; border: 1px solid var(--border);
  background: none; font-family: var(--font); font-size: 13px; font-weight: 500;
  color: var(--text-dim); cursor: pointer; margin-top: 4px;
}

/* ─── SCREEN HEADER (shared) ──────────────────── */
.s-header-bar {
  display: flex; align-items: flex-end; justify-content: space-between;
  padding: 20px 20px 16px; flex-shrink: 0;
}
.s-screen-title { font-size: 24px; font-weight: 500; letter-spacing: -.5px; }
.s-screen-sub { font-size: 13px; color: var(--text-dim); margin-top: 2px; font-weight: 300; }
</style>
</head>
<body>

<!-- ───────────── ONBOARDING ───────────── -->
<div id="onboarding" class="ob">
  <div class="ob-logo">
    <div class="ob-logo-mark"><span>O</span></div>
    <span class="ob-logo-name">ORVA</span>
  </div>
  <div class="ob-progress"><div class="ob-progress-fill" id="ob-progress-fill" style="width:12.5%"></div></div>
  <div class="ob-content" id="ob-content"></div>
  <div class="ob-footer">
    <button class="ob-back hidden" id="ob-back" onclick="obBack()">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 8H2M7 3l-5 5 5 5"/></svg>
      Volver
    </button>
    <button class="ob-next" id="ob-next" onclick="obNext()">Continuar</button>
  </div>
</div>

<!-- ───────────── MAIN APP ───────────── -->
<div id="app" class="app hidden">

  <!-- Header (chat only) -->
  <div class="header" id="app-header">
    <div class="header-avatar" id="hdr-avatar"><span>O</span></div>
    <div class="header-info">
      <div class="header-name">ORVA</div>
      <div class="header-status" id="hdr-status">Disponible ahora</div>
    </div>
    <button class="header-btn" onclick="resetChat()" title="Reiniciar">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M3 12a9 9 0 1 0 9-9"/><path d="M3 5V3v2zm0 0H1h2z"/></svg>
    </button>
  </div>

  <!-- Chat Screen -->
  <div id="screen-chat" class="screen">
    <div class="conversation" id="conversation">
      <div class="day-marker">Hoy</div>
    </div>
    <div class="quick-replies hidden" id="quick-replies">
      <button class="qr-btn" onclick="useQR(this)">Hoy entreno, dame el veredicto</button>
      <button class="qr-btn" onclick="useQR(this)">Tengo molestia, necesito ayuda</button>
      <button class="qr-btn" onclick="useQR(this)">Como estoy de recuperacion</button>
      <button class="qr-btn" onclick="useQR(this)">Que hago si no puedo entrenar</button>
    </div>
    <div class="input-zone">
      <div class="input-wrap">
        <textarea class="input-field" id="inputField" placeholder="Contale a ORVA como te sentis hoy..." rows="1"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
          <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Cards Screen -->
  <div id="screen-cards" class="screen hidden">
    <div class="cards-screen" id="cards-content">
      <div class="s-header-bar">
        <div>
          <div class="s-screen-title">Mis Cards</div>
          <div class="s-screen-sub">Veredictos de ORVA</div>
        </div>
      </div>

      <!-- Today overview -->
      <div class="cs-hero">
        <div class="cs-hero-label">Resumen de hoy</div>
        <div class="cs-hero-date" id="cs-date">—</div>
        <div class="cs-rings" id="cs-rings">
          <!-- filled by JS -->
        </div>
      </div>

      <div class="cs-section-title" style="margin-top:4px">Veredictos recientes</div>
      <div class="cs-cards-list" id="cs-cards-list"></div>
      <div style="height:80px"></div>
    </div>
  </div>

  <!-- History Screen -->
  <div id="screen-history" class="screen hidden">
    <div class="history-screen">
      <div class="hs-topbar">
        <div class="hs-title">Historial</div>
        <button class="hs-add" onclick="toggleAddForm()">+</button>
      </div>
      <div class="hs-pills">
        <button class="hs-pill active" onclick="filterHistory('all', this)">Todo</button>
        <button class="hs-pill" onclick="filterHistory('activo', this)">Activos</button>
        <button class="hs-pill" onclick="filterHistory('resuelto', this)">Resueltos</button>
      </div>
      <div id="add-form-wrap" class="hidden">
        <div class="add-form">
          <div class="add-form-title">Nueva entrada</div>
          <div class="add-form-types">
            <button class="add-form-type active" onclick="setFormType('molestia',this)">Molestia</button>
            <button class="add-form-type" onclick="setFormType('lesion',this)">Lesion</button>
            <button class="add-form-type" onclick="setFormType('tension',this)">Tension</button>
          </div>
          <input class="add-form-input" id="new-zone" placeholder="Zona (ej: rodilla izquierda)">
          <textarea class="add-form-input" id="new-detail" rows="3" placeholder="Describe como se siente..." style="resize:none"></textarea>
          <button class="add-form-save" onclick="saveNewEntry()">Guardar</button>
        </div>
      </div>
      <div class="hs-list" id="hs-list"></div>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-chat" onclick="showScreen('chat')">
      <svg width="22" height="22" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span>ORVA</span>
    </button>
    <button class="nav-btn" id="nav-cards" onclick="showScreen('cards')">
      <svg width="22" height="22" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="3"/><path d="M8 21h8M12 17v4"/></svg>
      <span>Cards</span>
    </button>
    <button class="nav-btn" id="nav-history" onclick="showScreen('history')">
      <svg width="22" height="22" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span>Historial</span>
    </button>
  </nav>
</div>

<!-- Tweaks Panel -->
<div id="tweaks-panel" class="tweaks hidden">
  <div class="tweaks-title">Tweaks</div>
  <div class="tweaks-section">
    <div class="tweaks-lbl">Acento</div>
    <div class="tweaks-swatches" id="tw-accents"></div>
  </div>
  <div class="tweaks-section">
    <div class="tweaks-lbl">Fondo</div>
    <div class="tweaks-swatches" id="tw-bgs"></div>
  </div>
  <div class="tweaks-section">
    <div class="tweaks-lbl">Resumen hoy</div>
    <div class="tweaks-swatches" id="tw-hero"></div>
  </div>
  <div class="tweaks-section">
    <div class="tweaks-lbl">Tipografia</div>
    <div class="tweaks-swatches" id="tw-fonts"></div>
  </div>
  <button class="tweaks-close" onclick="closeTweaks()">Cerrar</button>
</div>

<script>
// ── TWEAKS DEFAULTS ────────────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#2B7FFF",
  "bg": "#F8F8F5",
  "font": "Plus Jakarta Sans",
  "heroBg": "#1C1A16"
}/*EDITMODE-END*/;

let tweaks = { ...TWEAK_DEFAULTS };

function applyTweaks() {
  const r = document.documentElement.style;
  r.setProperty('--accent', tweaks.accent);
  r.setProperty('--accent-2', shiftColor(tweaks.accent, -15));
  r.setProperty('--accent-bg', tweaks.accent + '1A');
  r.setProperty('--bg', tweaks.bg);
  r.setProperty('--surface', shiftColor(tweaks.bg, 4));
  r.setProperty('--font', `'${tweaks.font}', -apple-system, sans-serif`);
  r.setProperty('--hero-bg', tweaks.heroBg || '#1C1A16');
  // Auto text color: dark bg → light text, light bg → dark text
  const heroLum = heroLuminance(tweaks.heroBg || '#1C1A16');
  r.setProperty('--hero-text', heroLum < 0.35 ? '#F8F8F5' : '#1C1A16');
}
function heroLuminance(hex) {
  const r = parseInt(hex.slice(1,3),16)/255, g = parseInt(hex.slice(3,5),16)/255, b = parseInt(hex.slice(5,7),16)/255;
  return 0.299*r + 0.587*g + 0.114*b;
}
function shiftColor(hex, amt) {
  let r = parseInt(hex.slice(1,3),16)+amt, g = parseInt(hex.slice(3,5),16)+amt, b = parseInt(hex.slice(5,7),16)+amt;
  return `#${[r,g,b].map(v=>Math.max(0,Math.min(255,v)).toString(16).padStart(2,'0')).join('')}`;
}
applyTweaks();

// Tweaks UI setup
const ACCENT_OPTS = [
  {c:'#1ABAAA', l:'Teal'}, {c:'#2B7FFF', l:'Azul'}, {c:'#8B5CF6', l:'Violeta'},
  {c:'#0EA472', l:'Verde'}, {c:'#F97316', l:'Naranja'},
];
const BG_OPTS = [
  {c:'#EDEAE3', l:'Hueso'}, {c:'#F0EEF8', l:'Lavanda'}, {c:'#E8EFF5', l:'Hielo'},
  {c:'#F5F0E8', l:'Arena'}, {c:'#F8F8F5', l:'Blanco'},
];
const FONT_OPTS = [
  {c:'#1C1A16', l:'DM Sans', f:'DM Sans'},
  {c:'#2a2a2a', l:'Inter', f:'Inter'},
  {c:'#1a1a2e', l:'Plus Jakarta', f:'Plus Jakarta Sans'},
];

function buildSwatches(id, opts, key) {
  const wrap = document.getElementById(id);
  opts.forEach(o => {
    const btn = document.createElement('div');
    btn.className = 'tw-swatch' + (tweaks[key] === (o.f || o.c) ? ' selected' : '');
    btn.style.background = o.c;
    btn.title = o.l;
    btn.onclick = () => {
      tweaks[key] = o.f || o.c;
      applyTweaks();
      wrap.querySelectorAll('.tw-swatch').forEach(s => s.classList.remove('selected'));
      btn.classList.add('selected');
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: tweaks }, '*');
    };
    wrap.appendChild(btn);
  });
}
const HERO_OPTS = [
  {c:'#1C1A16', l:'Negro'},
  {c:'#1a2a3a', l:'Azul noche'},
  {c:'#0f2318', l:'Verde bosque'},
  {c:'#1a1a2e', l:'Indigo'},
  {c:'#2B7FFF', l:'Azul'},
  {c:'#F8F8F5', l:'Blanco'},
];
buildSwatches('tw-accents', ACCENT_OPTS, 'accent');
buildSwatches('tw-bgs', BG_OPTS, 'bg');
buildSwatches('tw-hero', HERO_OPTS, 'heroBg');
// Font swatches as text buttons
const fontWrap = document.getElementById('tw-fonts');
FONT_OPTS.forEach(o => {
  const btn = document.createElement('button');
  btn.style.cssText = `padding:5px 10px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface-2);font-family:'${o.f}',sans-serif;font-size:12px;font-weight:500;cursor:pointer;color:var(--text);transition:all .15s`;
  btn.textContent = o.l;
  if (tweaks.font === o.f) btn.style.borderColor = 'var(--text)';
  btn.onclick = () => {
    tweaks.font = o.f;
    applyTweaks();
    fontWrap.querySelectorAll('button').forEach(b => b.style.borderColor = 'var(--border)');
    btn.style.borderColor = 'var(--text)';
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: tweaks }, '*');
  };
  fontWrap.appendChild(btn);
});

// Tweaks protocol
window.addEventListener('message', e => {
  if (e.data?.type === '__activate_edit_mode') showTweaks();
  if (e.data?.type === '__deactivate_edit_mode') hideTweaks();
});
window.parent.postMessage({ type: '__edit_mode_available' }, '*');

function showTweaks() { document.getElementById('tweaks-panel').classList.remove('hidden'); }
function hideTweaks() { document.getElementById('tweaks-panel').classList.add('hidden'); }
function closeTweaks() { hideTweaks(); window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); }

// ── ONBOARDING ─────────────────────────────────────────────────
const OB_STEPS = [
  { key: 'sports',     num: '1 DE 8', title: 'Que deportes\npracticas?',        type: 'chips' },
  { key: 'device',     num: '2 DE 8', title: 'Sincroniza tu\nactividad',          type: 'options', opts: ['Apple Watch','Garmin','Whoop','Otro dispositivo','Por ahora no'] },
  { key: 'frequency',  num: '3 DE 8', title: 'Cuantas veces\nentrenas por semana?', type: 'freq' },
  { key: 'age',        num: '4 DE 8', title: 'Cuantos anos\ntenes?',              type: 'number', placeholder: 'Ej: 28' },
  { key: 'weight',     num: '5 DE 8', title: 'Cuanto pesas?',                    type: 'number', placeholder: 'Ej: 75', suffix: 'kg' },
  { key: 'gender',     num: '6 DE 8', title: 'Genero',                           type: 'options', opts: ['Masculino','Femenino','No binario','Prefiero no decir'] },
  { key: 'email',      num: '7 DE 8', title: 'Tu correo\nelectronico',            type: 'email', placeholder: 'nombre@correo.com' },
  { key: 'name',       num: '8 DE 8', title: 'Como te\nllamas?',                 type: 'name' },
];
const SPORTS_LIST = ['Running','Bicicleta','Funcional','HIIT','Spinning','Crossfit','Futbol','Tenis','Basket','Rugby','Voley','Padel'];

let obStep = 0;
let obData = { sports: [], device: null, frequency: 3, age: '', weight: '', gender: null, email: '', firstName: '', lastName: '' };

function obRender() {
  const s = OB_STEPS[obStep];
  document.getElementById('ob-progress-fill').style.width = ((obStep + 1) / 8 * 100) + '%';
  document.getElementById('ob-back').classList.toggle('hidden', obStep === 0);
  const next = document.getElementById('ob-next');
  next.textContent = obStep === 7 ? 'Empezar con ORVA' : 'Continuar';
  next.disabled = !obCanNext();

  let html = `<div class="ob-step-num">${s.num}</div><h2 class="ob-title">${s.title.replace(/\n/g,'<br>')}</h2>`;

  if (s.type === 'chips') {
    html += `<p class="ob-sub">Podes elegir mas de uno</p><div class="ob-chips">`;
    SPORTS_LIST.forEach(sp => {
      const on = obData.sports.includes(sp);
      html += `<button class="ob-chip${on?' active':''}" onclick="obToggleSport('${sp}')">${sp}</button>`;
    });
    html += '</div>';
  } else if (s.type === 'options') {
    html += `<div class="ob-options">`;
    s.opts.forEach(o => {
      const on = obData[s.key] === o;
      html += `<button class="ob-option${on?' active':''}" onclick="obSelect('${s.key}','${o}')">
        <span>${o}</span>
        <div class="ob-check">
          <svg width="10" height="8" fill="none" stroke="${on?'var(--text)':'#ccc'}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 4l3 3 6-6"/></svg>
        </div>
      </button>`;
    });
    html += '</div>';
  } else if (s.type === 'freq') {
    html += `<div class="ob-freq">
      <div class="ob-freq-num" id="ob-freq-num">${obData.frequency}</div>
      <div class="ob-freq-dots">`;
    for (let i = 1; i <= 7; i++) {
      html += `<div class="ob-freq-dot${obData.frequency===i?' active':''}" onclick="obSetFreq(${i})">${i}</div>`;
    }
    html += '</div><div style="font-size:13px;color:var(--text-dim);font-weight:400">dias por semana</div></div>';
  } else if (s.type === 'number' || s.type === 'email') {
    html += `<div class="ob-input-wrap">
      <input class="ob-input" id="ob-field" type="${s.type==='email'?'email':'number'}" 
        placeholder="${s.placeholder}" value="${obData[s.key]||''}"
        oninput="obSetField('${s.key}',this.value)">
      ${s.suffix ? `<span class="ob-input-suffix">${s.suffix}</span>` : ''}
    </div>`;
  } else if (s.type === 'name') {
    html += `<div style="display:flex;flex-direction:column;gap:12px">
      <input class="ob-input" placeholder="Nombre" value="${obData.firstName}" oninput="obData.firstName=this.value;obUpdateNext()">
      <input class="ob-input" placeholder="Apellido" value="${obData.lastName}" oninput="obData.lastName=this.value;obUpdateNext()">
    </div>`;
  }

  document.getElementById('ob-content').innerHTML = html;
  document.getElementById('ob-field')?.focus();
}

function obCanNext() {
  const s = OB_STEPS[obStep];
  if (s.key === 'sports') return obData.sports.length > 0;
  if (s.key === 'device') return !!obData.device;
  if (s.key === 'age') return obData.age !== '';
  if (s.key === 'weight') return obData.weight !== '';
  if (s.key === 'gender') return !!obData.gender;
  if (s.key === 'email') return obData.email.includes('@');
  if (s.key === 'name') return obData.firstName !== '' && obData.lastName !== '';
  return true;
}
function obUpdateNext() { document.getElementById('ob-next').disabled = !obCanNext(); }
function obToggleSport(sp) {
  const i = obData.sports.indexOf(sp);
  if (i > -1) obData.sports.splice(i, 1); else obData.sports.push(sp);
  obRender();
}
function obSelect(key, val) { obData[key] = val; obRender(); }
function obSetFreq(n) { obData.frequency = n; obRender(); }
function obSetField(key, val) { obData[key] = val; obUpdateNext(); }
function obNext() {
  if (!obCanNext()) return;
  if (obStep < 7) { obStep++; obRender(); }
  else obFinish();
}
function obBack() { if (obStep > 0) { obStep--; obRender(); } }
function obFinish() {
  try { localStorage.setItem('orva_user', JSON.stringify(obData)); } catch(e) {}
  document.getElementById('onboarding').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  initApp();
}
obRender();

// ── APP INIT ──────────────────────────────────────────────────
const WORKER_URL = 'https://sport-agent-api.a-ardizzir.workers.dev';
let messageHistory = [];
let isStreaming = false;
const STORAGE_KEY = 'orva_history_v1';

const conversation = document.getElementById('conversation');
const inputField   = document.getElementById('inputField');
const sendBtn      = document.getElementById('sendBtn');
const hdrAvatar    = document.getElementById('hdr-avatar');
const hdrStatus    = document.getElementById('hdr-status');

function getUserData() {
  try { return JSON.parse(localStorage.getItem('orva_user') || 'null'); } catch(e) { return null; }
}
function saveHistory() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(messageHistory)); } catch(e) {} }
function loadHistory() {
  try { const s = localStorage.getItem(STORAGE_KEY); if (s) { messageHistory = JSON.parse(s); return true; } } catch(e) {}
  return false;
}

function initApp() {
  const user = getUserData();
  buildCardsScreen(user);
  const had = loadHistory();
  if (had && messageHistory.length > 0) {
    restoreVisualHistory();
    document.getElementById('quick-replies').classList.add('hidden');
  } else {
    document.getElementById('quick-replies').classList.remove('hidden');
    setTimeout(() => callAgent('[SISTEMA: El usuario acaba de abrir ORVA. Saluda brevemente (1 frase), menciona que estas aqui para ayudarle con su entrenamiento de hoy, y haz una primera pregunta de check-in: como se siente fisicamente hoy y si tiene alguna molestia o duda.]'), 500);
  }
}

// ── VIEWPORT FIX ─────────────────────────────────────────────
function updateH() {
  const h = window.visualViewport ? window.visualViewport.height : window.innerHeight;
  document.documentElement.style.setProperty('--app-h', h + 'px');
}
if (window.visualViewport) window.visualViewport.addEventListener('resize', updateH);
window.addEventListener('resize', updateH);
updateH();

// ── HELPERS ───────────────────────────────────────────────────
function getTime() {
  const d = new Date();
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}
function getDateLabel() {
  const d = new Date();
  return `${d.getDate()} ${['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'][d.getMonth()]} ${d.getFullYear()}`.toUpperCase();
}
function scrollToBottom(smooth = true) {
  setTimeout(() => conversation.scrollTo({ top: conversation.scrollHeight, behavior: smooth ? 'smooth' : 'auto' }), 50);
}
function setAgentState(s) {
  hdrAvatar.classList.remove('thinking','error');
  if (s === 'thinking') { hdrAvatar.classList.add('thinking'); hdrStatus.textContent = 'Analizando...'; }
  else if (s === 'error') { hdrAvatar.classList.add('error'); hdrStatus.textContent = 'Error de conexion'; }
  else { hdrStatus.textContent = 'Disponible ahora'; }
}
function fmt(t) {
  return t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
}
function esc(s) {
  return s.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]);
}

// ── RENDER MESSAGES ───────────────────────────────────────────
function renderUserMsg(text) {
  const m = document.createElement('div');
  m.className = 'msg msg-user';
  m.innerHTML = `<div class="msg-bubble">${esc(text)}</div><div class="msg-time">${getTime()}</div>`;
  conversation.appendChild(m);
  scrollToBottom();
}
function createAgentBubble() {
  const m = document.createElement('div');
  m.className = 'msg msg-agent';
  m.innerHTML = `<div class="msg-bubble"><span class="mc"></span><span class="s-cursor"></span></div><div class="msg-time">${getTime()}</div>`;
  conversation.appendChild(m);
  scrollToBottom();
  return { el: m, content: m.querySelector('.mc'), cursor: m.querySelector('.s-cursor') };
}
function showDots() {
  const t = document.createElement('div'); t.className = 'typing'; t.id = 'typing-dots';
  t.innerHTML = '<span></span><span></span><span></span>';
  conversation.appendChild(t); scrollToBottom();
}
function removeDots() { document.getElementById('typing-dots')?.remove(); }
function renderError(msg) {
  const m = document.createElement('div'); m.className = 'msg msg-agent msg-error';
  m.innerHTML = `<div class="msg-bubble">${esc(msg)}</div><div class="msg-time">${getTime()}</div>`;
  conversation.appendChild(m); scrollToBottom();
}

// ── VERDICT CARD ──────────────────────────────────────────────
function renderVerdict(data, parent = conversation) {
  const statusMap = { go: {label:'Listo para entrenar', cls:'go'}, caution: {label:'Entrenamiento moderado', cls:'caution'}, stop: {label:'Descanso recomendado', cls:'stop'} };
  const st = statusMap[data.status] || statusMap.caution;
  const gl = 408.4;
  const pct = Math.max(0, Math.min(100, data.intensity_percent || 0));
  const offset = gl * (1 - pct / 100);
  const accent = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#1ABAAA';
  const lw = Math.min(100, Math.max(0, data.load_percent || 0));
  const rw = Math.min(100, Math.max(0, data.risk_percent || 0));
  const lc = lw > 75 ? 'var(--stop)' : lw > 40 ? 'var(--caution)' : 'var(--go)';
  const rc = rw > 75 ? 'var(--stop)' : rw > 40 ? 'var(--caution)' : 'var(--go)';
  const doIt = (data.do_items || []).slice(0,4);
  const avoid = (data.avoid_items || []).slice(0,4);

  const card = document.createElement('div');
  card.className = 'verdict';
  card.innerHTML = `
    <div class="v-header">
      <div class="v-pill"><div class="v-dot ${st.cls}"></div><span class="v-pill-label">${esc(st.label)}</span></div>
      <span class="v-ts">${getDateLabel()} · ${getTime()}</span>
    </div>
    <svg class="v-gauge" viewBox="0 0 280 130" preserveAspectRatio="xMidYMid meet" overflow="visible">
      <path d="M20 110 A110 110 0 0 1 260 110" fill="none" stroke="var(--border)" stroke-width="12" stroke-linecap="round"/>
      <path d="M20 110 A110 110 0 0 1 260 110" fill="none" stroke="${accent}" stroke-width="12" stroke-linecap="round" stroke-dasharray="${gl}" stroke-dashoffset="${offset}"/>
      <text x="140" y="92" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="62" font-weight="200" fill="var(--text)" letter-spacing="-4">${Math.round(pct)}</text>
      <text x="193" y="92" font-family="DM Sans,sans-serif" font-size="20" font-weight="300" fill="var(--text-faint)">%</text>
      <text x="140" y="116" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="8" font-weight="500" fill="var(--text-faint)" letter-spacing="2">INTENSIDAD HOY</text>
      <text x="20" y="130" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="8" fill="var(--text-faint)">0</text>
      <text x="260" y="130" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="8" fill="var(--text-faint)">100</text>
    </svg>
    <div class="v-title">${esc(data.title || '')}</div>
    <div class="v-bars">
      <div><div class="v-bar-row"><span class="v-bar-lbl">Carga semanal</span><span class="v-bar-val">${Math.round(lw)}<span class="u">%</span></span></div><div class="v-bar-track"><div class="v-bar-fill" style="width:${lw}%;background:${lc}"></div></div></div>
      <div><div class="v-bar-row"><span class="v-bar-lbl">Riesgo lesion</span><span class="v-bar-val">${Math.round(rw)}<span class="u">%</span></span></div><div class="v-bar-track"><div class="v-bar-fill" style="width:${rw}%;background:${rc}"></div></div></div>
      ${data.volume_delta ? `<div><div class="v-bar-row"><span class="v-bar-lbl">Volumen vs plan</span><span class="v-bar-val">${esc(data.volume_delta)}</span></div></div>` : ''}
    </div>
    ${data.micro_tip ? `<div class="v-tip"><div class="v-tip-lbl">Tip</div><div class="v-tip-txt">${esc(data.micro_tip)}</div></div>` : ''}
    ${(doIt.length || avoid.length) ? `
    <div class="v-actions">
      ${doIt.length ? `<div class="v-act-title">Haz</div><div class="v-act-grid">${doIt.map(i=>`<div class="v-act-item"><span class="v-act-icon do">+</span><span>${esc(i)}</span></div>`).join('')}</div>` : ''}
      ${avoid.length ? `<div class="v-act-title" style="margin-top:${doIt.length?'12px':'0'}">Evita</div><div class="v-act-grid">${avoid.map(i=>`<div class="v-act-item no"><span class="v-act-icon no">-</span><span>${esc(i)}</span></div>`).join('')}</div>` : ''}
    </div>` : ''}
    ${data.reasoning ? `<div class="v-reasoning">${fmt(data.reasoning)}</div>` : ''}
  `;
  parent.appendChild(card);
  scrollToBottom();
}

function processResponse(text, bubble) {
  const m = text.match(/<<<VERDICT\s*([\s\S]*?)\s*VERDICT>>>/);
  if (m) {
    const before = text.substring(0, m.index).trim();
    const after = text.substring(m.index + m[0].length).trim();
    try {
      const vd = JSON.parse(m[1].trim());
      if (before) { bubble.content.innerHTML = fmt(before); bubble.cursor.remove(); }
      else bubble.el.remove();
      renderVerdict(vd);
      if (after) { const b2 = createAgentBubble(); b2.content.innerHTML = fmt(after); b2.cursor.remove(); }
      return;
    } catch(e) {}
  }
  bubble.content.innerHTML = fmt(text);
  bubble.cursor.remove();
}

// ── API CALL (streaming) ──────────────────────────────────────
async function callAgent(userMsg) {
  messageHistory.push({ role: 'user', content: userMsg });
  setAgentState('thinking'); isStreaming = true; sendBtn.disabled = true;
  showDots();
  let bubble = null, full = '';
  try {
    const res = await fetch(WORKER_URL, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: messageHistory }),
    });
    if (!res.ok) { const e = await res.json().catch(()=>{}); throw new Error(e?.error || `Error ${res.status}`); }
    removeDots();
    bubble = createAgentBubble();
    const reader = res.body.getReader(); const dec = new TextDecoder(); let buf = '';
    while (true) {
      const { done, value } = await reader.read(); if (done) break;
      buf += dec.decode(value, { stream: true });
      const lines = buf.split('\n'); buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const d = line.slice(6).trim(); if (!d || d === '[DONE]') continue;
        try {
          const ev = JSON.parse(d);
          if (ev.type === 'content_block_delta' && ev.delta?.type === 'text_delta') {
            full += ev.delta.text;
            if (!full.includes('<<<VERDICT')) { bubble.content.innerHTML = fmt(full); scrollToBottom(false); }
            else { bubble.content.innerHTML = fmt(full.substring(0, full.indexOf('<<<VERDICT')).trim()); }
          }
        } catch(e) {}
      }
    }
    processResponse(full, bubble);
    messageHistory.push({ role: 'assistant', content: full });
    saveHistory();
    setAgentState('online');
    document.getElementById('quick-replies').classList.add('hidden');
  } catch(err) {
    removeDots(); if (bubble) bubble.el.remove();
    renderError(err.message.includes('Failed to fetch') ? 'No se pudo conectar. Revisa tu conexion.' : err.message);
    setAgentState('error'); messageHistory.pop();
  } finally { isStreaming = false; sendBtn.disabled = inputField.value.trim() === ''; }
}

function restoreVisualHistory() {
  for (const m of messageHistory) {
    if (m.role === 'user' && !m.content.startsWith('[SISTEMA:')) renderUserMsg(m.content);
    else if (m.role === 'assistant') { const b = createAgentBubble(); processResponse(m.content, b); }
  }
}

function resetChat() {
  if (!confirm('Reiniciar conversacion? Se borrara el historial.')) return;
  localStorage.removeItem(STORAGE_KEY);
  messageHistory = [];
  conversation.innerHTML = '<div class="day-marker">Hoy</div>';
  document.getElementById('quick-replies').classList.remove('hidden');
  setTimeout(() => callAgent('[SISTEMA: El usuario reinicio. Saluda brevemente y haz el check-in.]'), 300);
}

function useQR(btn) {
  inputField.value = btn.textContent;
  document.getElementById('quick-replies').classList.add('hidden');
  sendMessage();
}

// ── INPUT ─────────────────────────────────────────────────────
inputField.addEventListener('input', () => {
  sendBtn.disabled = inputField.value.trim() === '' || isStreaming;
  inputField.style.height = 'auto';
  inputField.style.height = Math.min(inputField.scrollHeight, 100) + 'px';
});
inputField.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
async function sendMessage() {
  const t = inputField.value.trim(); if (!t || isStreaming) return;
  inputField.value = ''; inputField.style.height = 'auto'; sendBtn.disabled = true;
  renderUserMsg(t); await callAgent(t);
}

// ── NAVIGATION ────────────────────────────────────────────────
let currentScreen = 'chat';
function showScreen(name) {
  ['chat','cards','history'].forEach(s => {
    document.getElementById(`screen-${s}`).classList.toggle('hidden', s !== name);
    document.getElementById(`nav-${s}`).classList.toggle('active', s === name);
  });
  document.getElementById('app-header').classList.toggle('hidden', name !== 'chat');
  currentScreen = name;
  if (name === 'cards') buildCardsScreen(getUserData());
}

// ── CARDS SCREEN ──────────────────────────────────────────────
const SAMPLE_VERDICTS = [
  { status: 'caution', intensity_percent: 65, title: 'Baja la intensidad hoy', load_percent: 72, risk_percent: 28, micro_tip: 'El HRV bajo este indicando fatiga acumulada. Entrena pero sin series.', do_items: ['Ritmo suave zona 2','Hidratacion extra'], avoid_items: ['Series de velocidad','HIIT'], reasoning: 'Tu HRV (67ms) esta debajo del baseline. La carga semanal acumulada es alta.' },
  { status: 'go', intensity_percent: 85, title: 'Sesion normal, adelante', load_percent: 45, risk_percent: 15, do_items: ['Carga completa','Trabajo tecnico'], avoid_items: ['Forzar si aparece dolor'], reasoning: 'Recuperacion al 82%, bien descansado. Dia ideal para entrenar fuerte.' },
  { status: 'stop', intensity_percent: 20, title: 'Dia de recuperacion activa', load_percent: 88, risk_percent: 60, micro_tip: 'Caminata o natacion suave. Nada de carga.', do_items: ['Caminata 20-30min','Movilidad'], avoid_items: ['Entrenamiento de fuerza','Running'], reasoning: 'Cuatro dias consecutivos. El cuerpo necesita regenerarse para mantener adaptacion.' },
];

function buildCardsScreen(user) {
  const rings = document.getElementById('cs-rings');
  document.getElementById('cs-date').textContent = new Date().toLocaleDateString('es-AR', { weekday: 'long', day: 'numeric', month: 'long' });
  const metrics = [
    { label: 'HRV', value: 67, max: 100, color: '#1ABAAA' },
    { label: 'Recup.', value: 78, max: 100, color: '#3DAA6A' },
    { label: 'Sueno', value: 80, max: 100, color: '#8B5CF6' },
    { label: 'FC Rep.', value: 65, max: 100, color: '#F97316' },
  ];
  const sz = 62, stroke = 5, r = (sz - stroke * 2) / 2, circ = 2 * Math.PI * r;
  rings.innerHTML = metrics.map(m => {
    const fill = (m.value / m.max) * circ;
    return `<div class="cs-ring">
      <svg width="${sz}" height="${sz}" style="transform:rotate(-90deg)">
        <circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="rgba(255,255,255,.15)" stroke-width="${stroke}"/>
        <circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="${m.color}" stroke-width="${stroke}" stroke-dasharray="${fill} ${circ}" stroke-linecap="round"/>
      </svg>
      <div style="text-align:center;margin-top:-${sz/2+2}px;margin-bottom:${sz/2-8}px;position:relative">
        <div style="font-size:16px;font-weight:500;color:white;letter-spacing:-.5px">${m.value}</div>
      </div>
      <div class="cs-ring-lbl">${m.label}</div>
    </div>`;
  }).join('');

  const list = document.getElementById('cs-cards-list');
  list.innerHTML = '';
  SAMPLE_VERDICTS.forEach(v => renderVerdict(v, list));
}

// ── HISTORY ───────────────────────────────────────────────────
let historyData = [
  { id:1, type:'molestia', zone:'Rodilla izquierda', detail:'Dolor leve en tendon rotuliano post-running. Molestia al bajar escaleras.', status:'mejorando', date:'10 abr', sport:'Running', updates:[{d:'10 abr',t:'Inicio: dolor leve post-running',s:'activo'},{d:'14 abr',t:'Mejoria notable, sin dolor en reposo',s:'mejorando'},{d:'20 abr',t:'Casi resuelto',s:'mejorando'}] },
  { id:2, type:'tension', zone:'Zona lumbar', detail:'Tension muscular post-funcional con carga alta. Sin irradiacion.', status:'resuelto', date:'22 mar', sport:'Funcional', updates:[{d:'22 mar',t:'Tension post-entreno leve',s:'activo'},{d:'28 mar',t:'Resuelto con descanso y movilidad',s:'resuelto'}] },
  { id:3, type:'lesion', zone:'Tobillo derecho', detail:'Esguince grado 1 en partido de futbol. Sin inestabilidad significativa.', status:'resuelto', date:'5 feb', sport:'Futbol', updates:[{d:'5 feb',t:'Esguince grado 1, reposo 3 dias',s:'activo'},{d:'10 feb',t:'Vuelta al trote tranquilo',s:'mejorando'},{d:'20 feb',t:'Resuelto completamente',s:'resuelto'}] },
];
let expandedHs = null;
let hsFilter = 'all';
let newEntryType = 'molestia';

const STATUS_DOT = { activo: 'var(--stop)', mejorando: 'var(--caution)', resuelto: 'var(--go)' };
const STATUS_LABEL = { activo: 'Activo', mejorando: 'Mejorando', resuelto: 'Resuelto' };
const STATUS_COLOR = { activo: 'var(--stop)', mejorando: 'var(--caution)', resuelto: 'var(--go)' };

function renderHistory() {
  const list = document.getElementById('hs-list');
  const filtered = hsFilter === 'all' ? historyData : historyData.filter(h => h.status === hsFilter);
  list.innerHTML = filtered.map(item => {
    const exp = expandedHs === item.id;
    const borderClass = item.status === 'activo' ? 'active-item' : item.status === 'mejorando' ? 'resolving' : '';
    return `<div class="hs-item ${borderClass}" onclick="toggleHs(${item.id})">
      <div class="hs-item-top">
        <div style="flex:1">
          <span class="hs-type-pill ${item.type}">${item.type.charAt(0).toUpperCase()+item.type.slice(1)}</span>
          <div class="hs-item-zone">${esc(item.zone)}</div>
          <div class="hs-item-meta">
            <div class="hs-status-dot" style="background:${STATUS_DOT[item.status]}"></div>
            <span class="hs-status-label" style="color:${STATUS_COLOR[item.status]}">${STATUS_LABEL[item.status]}</span>
          </div>
        </div>
        <span class="hs-date">${item.date}</span>
      </div>
      ${exp ? `
        <div class="hs-detail">${esc(item.detail)}</div>
        <div class="hs-timeline">
          <div class="hs-tl-title">Evolucion</div>
          <div class="hs-tl-list">
            ${item.updates.map(u=>`<div class="hs-tl-item"><div class="hs-tl-dot" style="background:${STATUS_DOT[u.s]}"></div><div class="hs-tl-date">${u.d}</div><div class="hs-tl-text">${esc(u.t)}</div></div>`).join('')}
          </div>
        </div>
      ` : ''}
    </div>`;
  }).join('');
}

function toggleHs(id) { expandedHs = expandedHs === id ? null : id; renderHistory(); }
function filterHistory(f, btn) {
  hsFilter = f;
  document.querySelectorAll('.hs-pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  renderHistory();
}
function toggleAddForm() { document.getElementById('add-form-wrap').classList.toggle('hidden'); }
function setFormType(t, btn) {
  newEntryType = t;
  document.querySelectorAll('.add-form-type').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}
function saveNewEntry() {
  const zone = document.getElementById('new-zone').value.trim();
  const detail = document.getElementById('new-detail').value.trim();
  if (!zone) return;
  historyData.unshift({ id: Date.now(), type: newEntryType, zone, detail: detail || 'Sin descripcion.', status: 'activo', date: new Date().toLocaleDateString('es-AR',{day:'numeric',month:'short'}), sport: 'General', updates: [{ d: 'Hoy', t: 'Registro creado', s: 'activo' }] });
  document.getElementById('add-form-wrap').classList.add('hidden');
  document.getElementById('new-zone').value = '';
  document.getElementById('new-detail').value = '';
  renderHistory();
}

renderHistory();

// ── STARTUP ───────────────────────────────────────────────────
const savedUser = getUserData();
const savedHistory = localStorage.getItem(STORAGE_KEY);
if (savedUser) {
  document.getElementById('onboarding').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  initApp();
}
</script>
